<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E1E0CC" />
      <stop offset="100%" stop-color="#B0AA90" />
    </linearGradient>
  </defs>

  <!-- Left 'L' geometric shape -->
  <polygon points="30,60 55,45 55,65 45,70 45,120 90,145 90,170 30,135" fill="url(#logoGrad)" />
  
  <!-- Inner 'L' segment -->
  <polygon points="65,95 65,130 90,145 90,110" fill="url(#logoGrad)" />

  <!-- Right 'F' geometric shape -->
  <polygon points="100,170 100,90 140,65 140,85 115,100 115,115 135,105 135,125 115,135 115,145 160,120 160,145 100,180" fill="url(#logoGrad)" />
  
  <!-- Top Right Arrow -->
  <polygon points="145,45 185,45 180,80 165,70 145,85 135,70 155,55" fill="url(#logoGrad)" />

  <!-- Network Node & Lines -->
  <circle cx="130" cy="50" r="5" fill="url(#logoGrad)" />
  <line x1="105" y1="40" x2="130" y2="50" stroke="url(#logoGrad)" stroke-width="3" />
  <line x1="130" y1="50" x2="155" y2="60" stroke="url(#logoGrad)" stroke-width="3" />
  <line x1="130" y1="50" x2="115" y2="80" stroke="url(#logoGrad)" stroke-width="3" />
</svg>
